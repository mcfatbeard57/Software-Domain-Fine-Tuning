seed: 42

# Better decoder-only than BLOOM for instruction-following
model_name: "Qwen/Qwen2.5-0.5B-Instruct"   # safer on free Colab
# model_name: "Qwen/Qwen2.5-1.5B-Instruct" # better quality if VRAM allows

max_len: 256
train_rows: 20000
val_rows: 1000

qlora:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "float16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"

train:
  epochs: 1
  lr: 2e-4
  per_device_train_bs: 4
  per_device_eval_bs: 4
  grad_accum: 8
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2
  fp16: true
  gradient_checkpointing: true
  use_reentrant: false

output_dir: "outputs/part_b_qlora"